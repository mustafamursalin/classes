        // ===============================
        console.log("3 length:", arr1.length);

        let mz = [1, 2, 3];

        mz.push(4);
        // pop (end)
        mz.pop();
        // unshift (start)
        mz.unshift(0);
        // shift (start)
        mz.shift();

        // ===============================
        // 8. Map (transform)
        // ===============================
        let mapArr = [1, 2, 3];
        let doubled = mapArr.map(v => v * 2);
        console.log("8:", doubled, mapArr);

        // ===============================

        // ===============================

        // ===============================
        let findArr = [5, 10, 15];

        // ===============================

        // ===============================

        // ===============================

        // ===============================

        // ===============================

        // ===============================
        let testArr = [2, 4, 6];
